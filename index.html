<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#ffffff;
  --bg-soft:#f7f7f7;
  --black:#1a1a1a;
  --dark:#2c2c2c;
  --mid:#999999;
  --light:#cccccc;
  --faint:#e5e5e5;
  --whisper:#f0f0f0;
}

html{scroll-behavior:smooth}

body{
  font-family:'Jost',sans-serif;
  background:var(--bg);
  color:var(--black);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* Subtle noise texture overlay */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
}

/* Soft gradient wash at the top */
body::after{
  content:'';
  position:fixed;
  top:0;left:0;right:0;
  height:60vh;
  background:linear-gradient(180deg,rgba(0,0,0,0.015) 0%,transparent 100%);
  pointer-events:none;
  z-index:0;
}

.page-wrapper{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:0;
}

/* ── Floating decorative particles ── */
.particle{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  z-index:0;
  opacity:0;
  animation:floatParticle 20s ease-in-out infinite;
}
.particle:nth-child(1){width:6px;height:6px;background:var(--light);top:15%;left:10%;animation-delay:0s}
.particle:nth-child(2){width:4px;height:4px;background:var(--faint);top:30%;right:15%;animation-delay:3s}
.particle:nth-child(3){width:5px;height:5px;background:var(--mid);top:60%;left:8%;animation-delay:6s}
.particle:nth-child(4){width:3px;height:3px;background:var(--light);top:75%;right:12%;animation-delay:9s}
.particle:nth-child(5){width:5px;height:5px;background:var(--faint);top:45%;left:85%;animation-delay:12s}
.particle:nth-child(6){width:4px;height:4px;background:var(--light);top:85%;left:20%;animation-delay:15s}

@keyframes floatParticle{
  0%,100%{opacity:0;transform:translateY(0) scale(1)}
  10%{opacity:0.6}
  50%{opacity:0.4;transform:translateY(-40px) scale(1.3)}
  90%{opacity:0.6}
}

/* ── Botanical SVG flourishes ── */
.flourish{
  display:block;
  margin:0 auto;
  opacity:0;
  animation:fadeSlideUp 1.2s ease forwards;
}
.flourish-top{animation-delay:0.3s;margin-bottom:0.5rem}
.flourish-mid{animation-delay:1s;margin-top:1.5rem;margin-bottom:1.5rem}
.flourish-bottom{animation-delay:1.8s;margin-top:1.5rem}

/* ── Hero Section ── */
.hero{
  text-align:center;
  padding:2rem 0 0;
  opacity:0;
  animation:fadeSlideUp 1.4s ease 0.1s forwards;
}

.hero-label{
  font-family:'Jost',sans-serif;
  font-weight:200;
  font-size:0.75rem;
  letter-spacing:0.35em;
  text-transform:uppercase;
  color:var(--mid);
  margin-bottom:1rem;
}

.hero-names{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-size:clamp(2.5rem,7vw,4.5rem);
  line-height:1.1;
  color:var(--black);
  margin-bottom:0.25rem;
}

.hero-ampersand{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-weight:300;
  font-size:clamp(1.8rem,5vw,3rem);
  color:var(--mid);
  display:block;
  margin:0.15em 0;
}

.hero-date{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-weight:400;
  font-size:clamp(1.1rem,3vw,1.5rem);
  color:var(--dark);
  letter-spacing:0.05em;
  margin-top:0.5rem;
}

/* ── Divider ── */
.divider{
  width:60px;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--light),transparent);
  margin:1.5rem auto;
  opacity:0;
  animation:fadeIn 1s ease 0.8s forwards;
}

/* ── Image Section ── */
.image-section{
  width:100%;
  max-width:480px;
  margin:0 auto;
  opacity:0;
  animation:fadeSlideUp 1.2s ease 0.9s forwards;
}

.image-frame{
  position:relative;
  overflow:hidden;
}

.image-frame img{
  display:block;
  width:100%;
  height:auto;
  max-height:70vh;
  object-fit:cover;
  object-position:center top;
}

/* ── Countdown Section ── */
.countdown-section{
  text-align:center;
  padding:1rem 0 0;
  opacity:0;
  animation:fadeSlideUp 1.2s ease 1.3s forwards;
}

.countdown-label{
  font-family:'Jost',sans-serif;
  font-weight:200;
  font-size:0.7rem;
  letter-spacing:0.4em;
  text-transform:uppercase;
  color:var(--mid);
  margin-bottom:1.25rem;
}

.countdown-grid{
  display:flex;
  justify-content:center;
  gap:0.75rem;
  flex-wrap:wrap;
}

.countdown-unit{
  display:flex;
  flex-direction:column;
  align-items:center;
  min-width:72px;
}

.countdown-value{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-size:clamp(2.2rem,6vw,3.2rem);
  line-height:1;
  color:var(--black);
  width:72px;
  height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--faint);
  border-radius:3px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(4px);
  transition:transform 0.3s ease;
  position:relative;
  overflow:hidden;
}

.countdown-value::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--light),transparent);
}

.countdown-value.tick{
  animation:tickPulse 0.4s ease;
}

.countdown-unit-label{
  font-family:'Jost',sans-serif;
  font-weight:300;
  font-size:0.6rem;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--mid);
  margin-top:0.5rem;
}

/* ── Celebration state ── */
.celebration{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.4rem,4vw,2rem);
  font-style:italic;
  color:var(--black);
  text-align:center;
  animation:breathe 3s ease-in-out infinite;
}

/* ── Footer ── */
.footer{
  text-align:center;
  padding:1rem 0 2.5rem;
  opacity:0;
  animation:fadeSlideUp 1.2s ease 1.6s forwards;
}

.footer-quote{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-weight:400;
  font-size:clamp(0.95rem,2.5vw,1.15rem);
  color:var(--mid);
  max-width:400px;
  margin:0 auto;
  line-height:1.6;
}

/* ── Animations ── */
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes breathe{
  0%,100%{transform:scale(1);opacity:0.9}
  50%{transform:scale(1.02);opacity:1}
}

@keyframes tickPulse{
  0%{transform:scale(1)}
  40%{transform:scale(1.08)}
  100%{transform:scale(1)}
}

/* ── Music controls ── */
.music-overlay{
  position:fixed;
  inset:0;
  z-index:100;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:var(--bg);
  cursor:pointer;
  opacity:1;
  transition:opacity 0.6s ease;
}

.music-overlay.fade-out{
  opacity:0;
  pointer-events:none;
}

.music-overlay-icon{
  width:56px;
  height:56px;
  border:1px solid var(--faint);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:1.25rem;
  animation:breathe 3s ease-in-out infinite;
}

.music-overlay-text{
  font-family:'Jost',sans-serif;
  font-weight:200;
  font-size:0.65rem;
  letter-spacing:0.35em;
  text-transform:uppercase;
  color:var(--mid);
}

.music-toggle{
  position:fixed;
  bottom:1.25rem;
  right:1.25rem;
  z-index:50;
  width:40px;
  height:40px;
  border:1px solid var(--faint);
  border-radius:50%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(6px);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:opacity 0.4s ease, transform 0.2s ease;
  transform:scale(1);
}

.music-toggle:hover{
  transform:scale(1.08);
}

.music-toggle.visible{
  opacity:1;
}

.music-toggle svg{
  width:16px;
  height:16px;
}

.music-bars{
  display:flex;
  align-items:flex-end;
  gap:2px;
  height:14px;
}

.music-bars span{
  display:block;
  width:2px;
  background:var(--black);
  border-radius:1px;
}

.music-bars.playing span{
  animation:barBounce 0.8s ease-in-out infinite alternate;
}

.music-bars.playing span:nth-child(1){height:4px;animation-delay:0s}
.music-bars.playing span:nth-child(2){height:8px;animation-delay:0.15s}
.music-bars.playing span:nth-child(3){height:12px;animation-delay:0.3s}
.music-bars.playing span:nth-child(4){height:6px;animation-delay:0.45s}

.music-bars:not(.playing) span{height:2px}

@keyframes barBounce{
  0%{transform:scaleY(0.4)}
  100%{transform:scaleY(1)}
}

/* ── Responsive ── */
@media(min-width:640px){
  .page-wrapper{padding:0}
  .countdown-unit{min-width:86px}
  .countdown-value{width:86px;height:86px;font-size:3rem}
  .countdown-grid{gap:1.25rem}
}

@media(min-width:1024px){
  .page-wrapper{padding:0}
}
</style>
</head>
<body>

<!-- Floating particles -->

<div class="page-wrapper">

<script>
(function(){
  /* ── i18n ── */
  var i18n = {
    en: {
      title:          'Amalie & Raymond \u2014 Save the Date',

      heroDate:       'October thirty-first, two thousand twenty-six',
      countdownLabel: 'Counting down to forever',
      days:           'Days',
      hours:          'Hours',
      minutes:        'Minutes',
      seconds:        'Seconds',
      celebration:    'The big day is here! \u{1F389}',
      footerQuote:    '\u201CWhatever our souls are made of, his and mine are the same.\u201D<br>\u2014 Emily Bront\u00EB',
      tapToOpen:      'Tap to open'
    },
    es: {
      title:          'Amalie & Raymond \u2014 Reserva la Fecha',

      heroDate:       'Treinta y uno de octubre, dos mil veintis\u00E9is',
      countdownLabel: 'Cuenta regresiva hacia el para siempre',
      days:           'D\u00EDas',
      hours:          'Horas',
      minutes:        'Minutos',
      seconds:        'Segundos',
      celebration:    '\u00A1El gran d\u00EDa ha llegado! \u{1F389}',
      footerQuote:    '\u201CSean cuales sean nuestras almas, la suya y la m\u00EDa son iguales.\u201D<br>\u2014 Emily Bront\u00EB',
      tapToOpen:      'Toca para abrir'
    }
  };

  var lang = (navigator.language || navigator.userLanguage || 'en').slice(0,2) === 'es' ? 'es' : 'en';
  var t = i18n[lang];

  document.documentElement.lang = lang;
  document.title = t.title;

  document.querySelectorAll('[data-i18n]').forEach(function(el){
    el.textContent = t[el.getAttribute('data-i18n')];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(function(el){
    el.innerHTML = t[el.getAttribute('data-i18n-html')];
  });

  /* ── Countdown ── */
  var weddingDate = new Date('2026-10-31T18:00:00').getTime();
  var els = {
    days:    document.getElementById('cd-days'),
    hours:   document.getElementById('cd-hours'),
    minutes: document.getElementById('cd-minutes'),
    seconds: document.getElementById('cd-seconds')
  };
  var grid = document.getElementById('countdown');
  var prev = { days: null, hours: null, minutes: null, seconds: null };

  function pad(n){ return n < 10 ? '0' + n : String(n); }

  function tick(el){
    el.classList.remove('tick');
    void el.offsetWidth;
    el.classList.add('tick');
  }

  function update(){
    var now = Date.now();
    var diff = weddingDate - now;

    if(diff <= 0){
      grid.innerHTML = '<p class="celebration">' + t.celebration + '</p>';
      return;
    }

    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);

    var vals = { days: d, hours: h, minutes: m, seconds: s };

    for(var key in vals){
      var display = key === 'days' ? String(vals[key]) : pad(vals[key]);
      if(prev[key] !== display){
        els[key].textContent = display;
        tick(els[key]);
        prev[key] = display;
      }
    }

    requestAnimationFrame(update);
  }

  requestAnimationFrame(update);

  /* ── Music ── */
  var audio = document.getElementById('bg-music');
  var overlay = document.getElementById('music-overlay');
  var toggle = document.getElementById('music-toggle');
  var bars = document.getElementById('music-bars');
  var playing = false;

  function startMusic(){
    audio.volume = 0.4;
    audio.play().then(function(){
      playing = true;
      bars.classList.add('playing');
      overlay.classList.add('fade-out');
      toggle.classList.add('visible');
      setTimeout(function(){ overlay.style.display = 'none'; }, 600);
    }).catch(function(){
      overlay.classList.add('fade-out');
      toggle.classList.add('visible');
      setTimeout(function(){ overlay.style.display = 'none'; }, 600);
    });
  }

  overlay.addEventListener('click', startMusic);

  toggle.addEventListener('click', function(){
    if(playing){
      audio.pause();
      playing = false;
      bars.classList.remove('playing');
    } else {
      audio.play();
      playing = true;
      bars.classList.add('playing');
    }
  });
})();
</script>
